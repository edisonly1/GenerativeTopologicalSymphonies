experiment_name: tension_t3_asap_score_push
seed: 42

data:
  raw_dir: data/raw/asap
  processed_dir: data/processed/asap_score
  splits_dir: data/splits/asap_score
  eval_dir: data/eval_sets/asap_score
  quantization: sixteenth
  phrase_strategy: cadence_bars_4

tokenization:
  pitch_mode: absolute
  pitch_vocab_size: 128
  duration_bins: 16
  velocity_bins: 8
  bar_position_bins: 16
  instrument_bins: 129
  harmony_bins: 25
  phrase_flag_bins: 4
  include_harmony: true
  include_phrase_flags: true

model:
  architecture: decoder_transformer_with_conductor_torus_tension_t3_asap_score_push
  d_model: 256
  num_layers: 4
  num_heads: 4
  dim_feedforward: 1024
  dropout: 0.1
  conductor_layers: 2
  conductor_heads: 4
  conductor_dim_feedforward: 512
  conductor_dropout: 0.1
  latent_geometry: torus_t3
  torus_axis_count: 3
  torus_dropout: 0.1
  use_conductor: true
  use_torus: true
  use_tension: true
  use_refiner: false

conductor_targets:
  recurrence: 2
  tension: 4
  density: 4
  cadence: 2
  harmonic_zone: 12

losses:
  reconstruction_weight: 1.0
  conductor_weight: 0.2
  motif_weight: 0.12
  phrase_boundary_weight: 0.15
  phrase_boundary_class_weights:
    - 0.0
    - 1.0
    - 2.5
    - 2.5
    - 3.0
  circle_weight: 0.15
  smooth_weight: 0.03
  geometry_weight: 0.25
  dispersion_weight: 0.12
  min_axis_variance: 0.25
  tension_weight: 0.025
  tension_pitch_weight: 0.35
  tension_rhythm_weight: 0.20
  tension_cadence_weight: 0.25
  tension_resolution_weight: 0.20
  tension_descent_weight: 0.75
  tension_monotonic_weight: 0.15
  tension_descent_step_size: 0.15
  conductor_target_weights:
    recurrence: 2.5
    tension: 1.0
    density: 1.0
    cadence: 1.0
    harmonic_zone: 1.0

training:
  batch_size: 4
  learning_rate: 0.000075
  weight_decay: 0.01
  max_steps: 40
  sequence_window: 512
  sequence_hop: 512
  min_sequence_length: 64
  phrase_aligned_windows: true
  min_complete_phrases: 4
  min_distinct_phrases: 4
  complete_phrase_weight: 0.10
  distinct_phrase_weight: 0.05
  recurrence_boost: 1.50
  cadence_boost: 0.35
  transpose_augmentation_semitones:
    - -5
    - -4
    - -3
    - -2
    - -1
    - 1
    - 2
    - 3
    - 4
    - 5
  transpose_probability: 0.8
  transpose_min_pitch: 21
  transpose_max_pitch: 108
  num_workers: 0
  gradient_clip_norm: 1.0
  log_every: 10
  validate_every: 20
  checkpoint_every: 20
  eval_batches: 8
  device: auto
  cache_examples: false
  init_checkpoint: outputs/runs/tension_t3_asap_score/latest.pt
  init_checkpoint_fallbacks:
    - outputs/runs/tension_t3_asap_score/checkpoints/best.pt
  output_dir: outputs/runs/tension_t3_asap_score_push

generation:
  temperature: 0.78
  top_k: 8
  top_p: 0.9

evaluation:
  sample_count: 16
  metrics:
    - recurrence
    - cadence_stability
    - jump_distance
    - pitch_class_divergence
    - structural_stress
