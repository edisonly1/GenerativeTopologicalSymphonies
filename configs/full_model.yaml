experiment_name: phase6_ablation
seed: 42

data:
  raw_dir: data/raw/maestro
  processed_dir: data/processed/maestro
  splits_dir: data/splits/maestro
  eval_dir: data/eval_sets/maestro
  quantization: sixteenth
  phrase_strategy: bars_4

tokenization:
  pitch_mode: absolute
  pitch_vocab_size: 128
  duration_bins: 16
  velocity_bins: 8
  bar_position_bins: 16
  instrument_bins: 129
  harmony_bins: 1
  phrase_flag_bins: 4
  include_harmony: true
  include_phrase_flags: true

model:
  architecture: staged_ablation_suite
  d_model: 256
  num_layers: 4
  num_heads: 4
  dropout: 0.1
  latent_style_dim: 64
  use_conductor: true
  use_torus: true
  use_tension: true
  use_refiner: true

generation:
  split: val
  prompt_events: 64
  generate_events: 96
  temperature: 0.9
  top_k: 0
  top_p: 0.95

evaluation:
  output_dir: outputs/reports/phase6_maestro
  split: val
  sample_count: 8
  prompt_events: 64
  generate_events: 96
  metrics:
    - recurrence
    - cadence_stability
    - jump_distance
    - pitch_class_divergence
    - perplexity
    - playability
    - persistence
    - structural_stress

stages:
  baseline:
    mode: generate
    config: configs/baseline.yaml
    checkpoint: outputs/runs/baseline_maestro/checkpoints/best.pt
  conductor:
    mode: generate
    config: configs/conductor_long.yaml
    checkpoint: outputs/runs/conductor_maestro_long_structural/checkpoints/best.pt
  torus:
    mode: generate
    config: configs/torus.yaml
    checkpoint: outputs/runs/torus_maestro/checkpoints/best.pt
    run_geometry: true
  tension:
    mode: generate
    config: configs/tension.yaml
    checkpoint: outputs/runs/tension_maestro/checkpoints/best.pt
    run_geometry: true
  refiner:
    mode: refine
    config: configs/refiner.yaml
    checkpoint: outputs/runs/refiner_maestro/checkpoints/best.pt
    primary_checkpoint: outputs/runs/tension_maestro/checkpoints/best.pt
    draft_stage: tension
  torus_t3:
    mode: generate
    config: configs/torus_t3.yaml
    checkpoint: outputs/runs/torus_t3_maestro/checkpoints/best.pt
    run_geometry: true
    skip_if_missing: true
  euclidean:
    mode: generate
    config: configs/euclidean.yaml
    checkpoint: outputs/runs/euclidean_maestro/checkpoints/best.pt
    run_geometry: true
    skip_if_missing: true
